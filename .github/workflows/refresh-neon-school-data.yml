name: Refresh Neon school warehouse

on:
  workflow_dispatch:
    inputs:
      years:
        description: Space-separated reporting years to refresh
        required: false
        default: "2025"
      refresh_sources:
        description: Refresh source CSVs before loading Neon
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 5 1 */3 *"

permissions:
  contents: read

concurrency:
  group: refresh-neon-school-warehouse
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      INPUT_YEARS: ${{ github.event.inputs.years }}
      INPUT_REFRESH_SOURCES: ${{ github.event.inputs.refresh_sources }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl requests "psycopg[binary]"

      - name: Validate configuration
        run: |
          test -n "$DATABASE_URL"

      - name: Refresh warehouse
        shell: bash
        run: |
          set -euo pipefail

          years="${INPUT_YEARS:-2025}"
          refresh_sources="${INPUT_REFRESH_SOURCES:-true}"

          python3 db/apply_schema.py --database-url "$DATABASE_URL"

          for year in $years; do
            if [[ ! -f "etl/data/raw/${year}/msmt_${year}_raw.xlsx" ]]; then
              echo "Missing tracked MŠMT workbook: etl/data/raw/${year}/msmt_${year}_raw.xlsx" >&2
              exit 1
            fi

            if [[ "$refresh_sources" == "true" ]]; then
              python3 etl/parse_msmt_xlsx.py --year "$year"
              python3 etl/fetch_eu_grants.py --year "$year"
              python3 etl/fetch_founder_budgets.py --year "$year"
              python3 etl/fetch_state_budget.py --year "$year"
              python3 etl/fetch_msmt_registry.py --year "$year" --update-csv
            fi

            python3 etl/load_school_raw.py --year "$year" --database-url "$DATABASE_URL"
            python3 etl/transform_school_core.py --year "$year" --database-url "$DATABASE_URL"
          done
